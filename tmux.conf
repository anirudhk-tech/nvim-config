# --- General Settings ---
set -g mouse on               # Enable mouse scrolling/clicking
set -g base-index 1           # Start window numbering at 1 (easier for your keyboard)
set -w -g pane-base-index 1   # Start pane numbering at 1
set -g renumber-windows on    # Automatically renumber windows when one is closed

# --- The "Double-Tap" & Prefix ---
unbind C-b
set -g prefix C-a              # Change prefix to Ctrl+a
bind-key C-a last-window      # HIT CTRL+A TWICE to jump between Nvim & Claude

# --- Mac Option Key Navigation (No Prefix Needed) ---
# Jump to windows 1-t using Option + 1, 2, ... t
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4

# --- Easy Splitting ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Drag to select and copy to system clipboard automatically
set -g copy-command 'pbcopy'
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

